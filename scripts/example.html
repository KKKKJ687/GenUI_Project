<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbine Control Unit A</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdn.rawgit.com/Mikhus/canvas-gauges/gh-pages/download/2.1.7/all/gauge.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    
    <style>
        /* Custom Scrollbar for Industrial Look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(12, minmax(0, 1fr));
            grid-auto-rows: 100px;
            gap: 1rem;
            padding: 1rem;
        }
        
        /* Widget Card Style */
        .widget-card {
            background-color: #334155;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        /* Mobile Breakpoint - Responsive Design */
        @media (max-width: 768px) {
            .grid-container {
                display: flex;
                flex-direction: column;
                gap: 1.5rem;
            }
            .widget-card {
                grid-column: span 12 !important;
                grid-row: auto !important;
                min-height: 120px; /* Finger-friendly touch targets */
            }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen font-sans" x-data="hmiStore">

    <header class="bg-slate-900 border-b border-slate-700 p-4 mb-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold text-blue-400">Turbine Control Unit A</h1>
            <p class="text-xs text-slate-500">Main control interface for gas turbine #1</p>
        </div>
        <div class="text-right">
            <div class="text-xs text-slate-500 font-mono">DSL v0.1</div>
            <div class="text-[10px] text-slate-600 font-mono">Hash: a4d40779</div>
        </div>
    </header>

    <main class="container mx-auto">
        <div class="grid-container">
            
        <div class="widget-card group" style="grid-column: 1 / span 4; grid-row: 3 / span 2;" x-data>
            
            <div class="absolute top-1 right-1 px-1.5 py-0.5 bg-black/50 rounded text-[9px] text-slate-400 font-mono border border-slate-700" 
                 title="Protocol: ProtocolType.MODBUS&#10;Address: 40001">
                PROTOCOLTYPE.MODBUS:40001
            </div>
            
            
    <div class="h-full flex flex-col justify-center items-center">
        <div class="text-sm font-medium text-slate-300 mb-3">Emergency Override</div>
        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" 
                   class="sr-only peer"
                   x-model="values['emergency_stop']"
                   @change="updateValue('emergency_stop', $event.target.checked)">
            <div class="w-14 h-7 bg-slate-700 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-blue-500 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-red-600"></div>
        </label>
        <div class="mt-2 text-xs font-mono text-slate-400">
            <span x-show="values['emergency_stop']">ACTIVE</span>
            <span x-show="!values['emergency_stop']">SAFE</span>
        </div>
    </div>
    
        </div>
        

        <div class="widget-card group" style="grid-column: 5 / span 4; grid-row: 1 / span 4;" x-data>
            
            <div class="absolute top-1 right-1 px-1.5 py-0.5 bg-black/50 rounded text-[9px] text-slate-400 font-mono border border-slate-700" 
                 title="Protocol: ProtocolType.MQTT&#10;Address: turbine/A/rpm">
                PROTOCOLTYPE.MQTT:turbine/A/rpm
            </div>
            
            
    <div class="h-full flex flex-col items-center justify-center">
        <div class="text-sm font-medium text-slate-300 mb-1">Turbine RPM</div>
        <canvas data-type="radial-gauge"
                data-width="150"
                data-height="150"
                data-units="RPM"
                data-min-value="0.0"
                data-max-value="12000.0"
                data-major-ticks="0,20,40,60,80,100"
                data-minor-ticks="2"
                data-stroke-ticks="true"
                data-color-plate="transparent"
                data-border-shadow-width="0"
                data-borders="false"
                data-needle-type="arrow"
                data-needle-width="2"
                data-needle-circle-size="7"
                data-needle-circle-outer="true"
                data-needle-circle-inner="false"
                data-animation-duration="1500"
                data-animation-rule="linear"
                data-value="3500.0"
                x-bind:data-value="values['rpm_gauge']"
        ></canvas>
    </div>
    
        </div>
        

        <div class="widget-card group" style="grid-column: 1 / span 4; grid-row: 1 / span 2;" x-data>
            
            <div class="absolute top-1 right-1 px-1.5 py-0.5 bg-black/50 rounded text-[9px] text-slate-400 font-mono border border-slate-700" 
                 title="Protocol: ProtocolType.MQTT&#10;Address: turbine/A/throttle">
                PROTOCOLTYPE.MQTT:turbine/A/throttle
            </div>
            
            
    <div class="h-full flex flex-col justify-between">
        <div class="flex justify-between items-center mb-2">
            <label class="text-sm font-medium text-slate-300">Throttle Position</label>
            <span class="text-xs font-mono bg-slate-700 px-2 py-1 rounded" x-text="values['throttle_val']"></span>
        </div>
        <div class="flex-grow flex items-center">
            <input type="range" 
                   min="0.0" max="100.0" step="1.0"
                   x-model.number="values['throttle_val']"
                   @input="updateValue('throttle_val', $event.target.value)"
                   class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
        </div>
        <div class="flex justify-between text-[10px] text-slate-500 mt-1">
            <span>0.0</span>
            <span>100.0</span>
        </div>
    </div>
    
        </div>
        
        </div>
    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('hmiStore', () => ({
                // Initial State
                values: {"emergency_stop": false, "rpm_gauge": 3500.0, "throttle_val": 15.0},
                
                // Bindings Metadata
                bindings: {"emergency_stop": {"protocol": "modbus", "address": "40001", "access_mode": "rw", "update_interval_ms": 1000}, "rpm_gauge": {"protocol": "mqtt", "address": "turbine/A/rpm", "access_mode": "r", "update_interval_ms": 1000}, "throttle_val": {"protocol": "mqtt", "address": "turbine/A/throttle", "access_mode": "rw", "update_interval_ms": 1000}},

                init() {
                    console.log('HMI System Initialized');
                    this.startMockDataStream();
                },

                // Core Communication Hook
                updateValue(id, value) {
                    this.values[id] = value;
                    const bind = this.bindings[id];
                    
                    if (bind) {
                        console.log(`[OUT] Protocol=${bind.protocol} Address=${bind.address} Val=${value}`);
                        // Hook for future MQTT/Modbus implementation
                        // window.backend.send(bind.topic, value);
                    }
                },
                
                // Simulation Loop (Deterministic Mock)
                startMockDataStream() {
                    setInterval(() => {
                        // Only update Read-Only widgets mock data
                        // In real app, this would consume MQTT messages
                    }, 2000);
                }
            }))
        })
    </script>
</body>
</html>
